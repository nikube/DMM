name: Release zip

# Two triggers:
#   - tag push (v*.*.*) -> attach the zip to a GitHub Release
#   - manual run        -> just upload the zip as a build artifact (handy for previews)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release on tag pushes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          # Strategy: tag push wins (strip leading 'v'), else fall back to the
          # version declared in the module descriptor so manual runs still
          # produce a sensibly-named zip.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep -oP "this->version\s*=\s*'\K[^']+" \
              dolimodulemanager/core/modules/modDoliModuleManager.class.php)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zipname=module_dolimodulemanager-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Sanity-check support matrix consistency
        # Catches the "release metadata is contradictory" class of mistakes
        # the senior review flagged. Three places declare compatibility:
        #   - the module descriptor (need_dolibarr_version + this->version)
        #   - dmm.json (consumed by other DMM instances)
        #   - dolistore.yaml (consumed by the DoliStore community marketplace)
        # If they drift, downstream tools report wrong info to users. We
        # require all three to agree on:
        #   - declared version    (tag-only check, dolistore.yaml is unversioned by design)
        #   - dolibarr_max upper bound
        #   - php_min lower bound
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          DESC_VERSION=$(grep -oP "this->version\s*=\s*'\K[^']+" \
            dolimodulemanager/core/modules/modDoliModuleManager.class.php)
          if [[ "${DESC_VERSION}" != "${{ steps.ver.outputs.version }}" ]]; then
            echo "::error::Tag is v${{ steps.ver.outputs.version }} but descriptor says ${DESC_VERSION}"
            exit 1
          fi

          # dolibarr_max: dmm.json says "23.*", dolistore.yaml says "V23".
          # Compare just the major number so the format difference doesn't
          # trip us up.
          JSON_MAX=$(python3 -c 'import json,re; m=re.match(r"(\d+)", json.load(open("dmm.json"))["compatibility"]["1.x"]["dolibarr_max"]); print(m.group(1))')
          YAML_MAX=$(grep -oP 'doli_max:\s*V?\K\d+' dolistore.yaml)
          if [[ "${JSON_MAX}" != "${YAML_MAX}" ]]; then
            echo "::error::dolibarr_max mismatch — dmm.json=${JSON_MAX}, dolistore.yaml=${YAML_MAX}"
            exit 1
          fi

          JSON_PHP=$(python3 -c 'import json; print(json.load(open("dmm.json"))["compatibility"]["1.x"]["php_min"])')
          YAML_PHP=$(grep -oP 'php_min:\s*"?\K[0-9.]+' dolistore.yaml)
          if [[ "${JSON_PHP}" != "${YAML_PHP}" ]]; then
            echo "::error::php_min mismatch — dmm.json=${JSON_PHP}, dolistore.yaml=${YAML_PHP}"
            exit 1
          fi

      - name: Lint PHP
        run: |
          # Catches syntax errors before they hit the released zip. -d display_errors=1
          # so warnings don't go silent on parse-time deprecations.
          find dolimodulemanager -type f -name '*.php' -print0 \
            | xargs -0 -n1 php -l -d display_errors=1

      - name: Build zip
        run: |
          # Convention enforced by Dolibarr's ?mode=deploy:
          #   module_<modulename>-<X.Y.Z>.zip with a single top-level dir
          #   matching <modulename>. We zip from the repo root so the
          #   "dolimodulemanager/" prefix is preserved.
          zip -r "${{ steps.ver.outputs.zipname }}" dolimodulemanager \
            -x 'dolimodulemanager/.git*' \
            -x 'dolimodulemanager/**/.DS_Store' \
            -x 'dolimodulemanager/**/*.swp'

      - name: Verify zip layout
        run: |
          # Fail-fast if the zip would be rejected by Dolibarr (must contain a
          # core/modules/mod*.class.php under the expected top-level folder).
          unzip -l "${{ steps.ver.outputs.zipname }}" | head -20
          unzip -p "${{ steps.ver.outputs.zipname }}" \
            dolimodulemanager/core/modules/modDoliModuleManager.class.php \
            > /dev/null

      - name: Upload as workflow artifact
        # Available for ~90 days on every run, even non-tag ones.
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.zipname }}
          path: ${{ steps.ver.outputs.zipname }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        # Only on tag pushes — auto-creates the release if missing.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ver.outputs.zipname }}
          generate_release_notes: true
          fail_on_unmatched_files: true
